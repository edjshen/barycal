# Browser-level E2E, powered by the shared @edjshen/e2e-kit toolkit.
#
# WHY this shape:
#   - The GATE runs only the converted, web-first @smoke/@critical specs, sharded
#     for speed; blob reports from each shard merge into one HTML report. This is
#     the required check.
#   - Accessibility (axe) runs NON-BLOCKING for now: on a legacy app axe surfaces
#     real violations, so it's informational until triaged (see e2e/MIGRATION.md).
#   - Each job seeds a fresh local Cloudflare D1 (demo user `ed`) before Playwright
#     boots `next dev`, so the run is self-contained with no service secrets.
#
# This is inlined in barycal for the pilot; it is shaped to lift into a reusable
# `edjshen/ci-workflows/.github/workflows/e2e.yml@v1` (workflow_call) later.
name: E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: Gate (smoke + critical)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]
    env:
      CI: 'true'
      E2E_GREP: '@smoke|@critical'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Prepare local D1 (migrate + seed)
        run: npm run e2e:prepare

      - name: Run E2E gate (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 3

  merge-report:
    name: Merge E2E report
    needs: [gate]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-*
          merge-multiple: true

      - name: Merge into one HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  a11y:
    name: Accessibility (axe) — non-blocking
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    env:
      CI: 'true'
      E2E_GREP: '@a11y'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Prepare local D1 (migrate + seed)
        run: npm run e2e:prepare

      - name: Run accessibility scans
        run: npx playwright test --reporter=html

      - name: Upload a11y report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: playwright-report/
          retention-days: 7
