name: Deploy Orbit to Pages
on:
  push:
    branches: ["claude/practical-newton-jbaxit"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Assemble static site
        run: |
          mkdir -p _site
          cp public/app.js public/orbit.css public/view.js public/icon.svg public/manifest.webmanifest public/sw.js _site/
          printf '%s' '<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1"><meta name="theme-color" content="#0C0B10"><title>Orbit</title><link rel="icon" href="icon.svg"><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="orbit.css"><script>window.ORBIT_API="https://bpqtjfdiwifvrnkzldwg.supabase.co/functions/v1/orbit";window.ORBIT_BASE="";</script></head><body><div id="app"><div class="shell"><div class="main"><div class="empty">Loading...</div></div></div></div><script src="app.js"></script></body></html>' > _site/index.html
          cp _site/index.html _site/view.html
          sed -i 's/src="app.js"/src="view.js"/' _site/view.html
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
